# ============================================
# Traffic Gateway Deployment
# ALWAYS ON - this is the demo entry point
# Friends connect to this gateway URL
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-gateway
  namespace: greenops
  labels:
    app: traffic-gateway
    tier: entry-point
spec:
  replicas: 1                  # Always 1, never scales
  selector:
    matchLabels:
      app: traffic-gateway
  template:
    metadata:
      labels:
        app: traffic-gateway
        tier: entry-point
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: gateway
        image: traffic-gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5001
          name: http
        env:
        - name: GATEWAY_PORT
          value: "5001"
        - name: WORKLOAD_URL
          value: "http://green-workload-service.greenops.svc.cluster.local:5000"
        - name: BACKEND_URL
          value: "http://greenops-api-service.greenops.svc.cluster.local:8000"

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 15
          periodSeconds: 15

        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5

---
# ============================================
# Gateway Service
# NodePort 30501 = accessible from browser
# Friends connect to: http://YOUR_IP:30501
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: traffic-gateway-service
  namespace: greenops
  labels:
    app: traffic-gateway
spec:
  type: NodePort
  ports:
  - port: 5001
    targetPort: 5001
    nodePort: 30501            # External access port
    protocol: TCP
    name: http
  selector:
    app: traffic-gateway
